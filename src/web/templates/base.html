<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Odin Web Interface{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <h1 class="logo">Odin</h1>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/health">Health</a></li>
                    <li><a href="/image-analyzer">Image Analyzer</a></li>
                    <li><a href="/confluence">Confluence</a></li>
                    <li><a href="/files">Files</a></li>
                    <li><a href="/logs">Logs</a></li>
                    <li><a href="/database">Database</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Odin Project. Version {% block version %}1.6.0{% endblock %}</p>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
