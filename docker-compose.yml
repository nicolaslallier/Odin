  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: odin-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - odin-network
    depends_on:
      portal:
        condition: service_healthy
      ollama:
        condition: service_started
      postgresql:
        condition: service_healthy
      n8n:
        condition: service_started
      rabbitmq:
        condition: service_started
      vault:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  # Ollama AI/ML model server
  ollama:
    image: ollama/ollama:latest
    container_name: odin-ollama
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - odin-network
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  # PostgreSQL database with TimescaleDB
  postgresql:
    image: timescale/timescaledb:latest-pg18
    container_name: odin-postgresql
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-odin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-odin_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-odin_db}
      - ENABLE_TIMESCALEDB=true
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      - ./scripts/init-timescaledb.sql:/docker-entrypoint-initdb.d/02-init-timescaledb.sql:ro
      - ./scripts/init-health-timescaledb.sql:/docker-entrypoint-initdb.d/03-init-health-timescaledb.sql:ro
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # n8n workflow automation
  n8n:
    image: n8nio/n8n:latest
    container_name: odin-n8n
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgresql
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-odin}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-odin_dev_password}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_PATH=/n8n/
      - WEBHOOK_URL=http://localhost/n8n/
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - odin-network
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped

  # RabbitMQ message broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: odin-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-odin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-odin_dev_password}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # HashiCorp Vault
  vault:
    image: hashicorp/vault:latest
    container_name: odin-vault
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_ROOT_TOKEN:-dev-root-token}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_ADDR=http://0.0.0.0:8200
    volumes:
      - vault-data:/vault/data
      - vault-logs:/vault/logs
    networks:
      - odin-network
    command: ["vault", "server", "-dev"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # MinIO object storage
  minio:
    image: minio/minio:latest
    container_name: odin-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BROWSER_REDIRECT_URL=http://localhost/minio/
    volumes:
      - minio-data:/data
    networks:
      - odin-network
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 20s

  # Celery worker for background tasks
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: odin-worker
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - C_FORCE_ROOT=true
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-odin}:${RABBITMQ_PASSWORD:-odin_dev_password}@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER:-odin}:${POSTGRES_PASSWORD:-odin_dev_password}@postgresql:5432/${POSTGRES_DB:-odin_db}
      - CELERY_TASK_TRACK_STARTED=${CELERY_TASK_TRACK_STARTED:-true}
      - CELERY_TASK_TIME_LIMIT=${CELERY_TASK_TIME_LIMIT:-3600}
      - CELERY_WORKER_CONCURRENCY=${CELERY_WORKER_CONCURRENCY:-4}
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-1000}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_SECURE=false
      - API_CALLBACK_URL=${API_CALLBACK_URL:-http://odin-api:8001}
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN:-dev-root-token}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
      - LOG_BUFFER_SIZE=${LOG_BUFFER_SIZE:-100}
      - LOG_BUFFER_TIMEOUT=${LOG_BUFFER_TIMEOUT:-5.0}
      - LOG_LEVEL_DB_MIN=${LOG_LEVEL_DB_MIN:-INFO}
    working_dir: /app
    command: celery -A src.worker.celery_app:celery_app worker --loglevel=info
    networks:
      - odin-network
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  # Celery Beat scheduler for periodic tasks
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: odin-beat
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - C_FORCE_ROOT=true
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-odin}:${RABBITMQ_PASSWORD:-odin_dev_password}@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER:-odin}:${POSTGRES_PASSWORD:-odin_dev_password}@postgresql:5432/${POSTGRES_DB:-odin_db}
      - CELERY_TASK_TRACK_STARTED=${CELERY_TASK_TRACK_STARTED:-true}
      - CELERY_TASK_TIME_LIMIT=${CELERY_TASK_TIME_LIMIT:-3600}
    working_dir: /app
    command: celery -A src.worker.celery_app:celery_app beat --loglevel=info
    networks:
      - odin-network
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      worker:
        condition: service_started
    restart: unless-stopped

  # Flower monitoring dashboard for Celery
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: odin-flower
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-odin}:${RABBITMQ_PASSWORD:-odin_dev_password}@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER:-odin}:${POSTGRES_PASSWORD:-odin_dev_password}@postgresql:5432/${POSTGRES_DB:-odin_db}
      - FLOWER_PORT=${FLOWER_PORT:-5555}
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:admin}
    working_dir: /app
    command: celery -A src.worker.celery_app:celery_app flower --port=5555 --basic-auth=${FLOWER_BASIC_AUTH:-admin:admin}
    networks:
      - odin-network
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      worker:
        condition: service_started
    restart: unless-stopped

volumes:
  postgresql-data:
  n8n-data:
  rabbitmq-data:
  vault-data:
  vault-logs:
  minio-data:
  ollama-models:

networks:
  odin-network:
    driver: bridge

