      - PYTHONDONTWRITEBYTECODE=1
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=8008
      - API_RELOAD=${API_RELOAD:-true}
      - API_LOG_LEVEL=${API_LOG_LEVEL:-info}
      - POSTGRES_DSN=postgresql+asyncpg://${POSTGRES_USER:-odin}:${POSTGRES_PASSWORD:-odin_dev_password}@postgresql:5432/${POSTGRES_DB:-odin_db}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-odin}:${RABBITMQ_PASSWORD:-odin_dev_password}@rabbitmq:5672/
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN:-dev-root-token}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
      - LOG_BUFFER_SIZE=${LOG_BUFFER_SIZE:-100}
      - LOG_BUFFER_TIMEOUT=${LOG_BUFFER_TIMEOUT:-5.0}
