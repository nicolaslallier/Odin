services:
  # Python application service (web portal)
  portal:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: portal
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - WEB_HOST=${WEB_HOST:-0.0.0.0}
      - WEB_PORT=${WEB_PORT:-8000}
      - WEB_RELOAD=${WEB_RELOAD:-true}
      - WEB_LOG_LEVEL=${WEB_LOG_LEVEL:-info}
      - API_BASE_URL=${API_BASE_URL:-http://odin-api:8001}
      - POSTGRES_DSN=postgresql+asyncpg://${POSTGRES_USER:-odin}:${POSTGRES_PASSWORD:-odin_dev_password}@postgresql:5432/${POSTGRES_DB:-odin_db}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN:-dev-root-token}
      - OLLAMA_BASE_URL=http://ollama:11434
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
      - LOG_BUFFER_SIZE=${LOG_BUFFER_SIZE:-100}
      - LOG_BUFFER_TIMEOUT=${LOG_BUFFER_TIMEOUT:-5.0}
      - LOG_LEVEL_DB_MIN=${LOG_LEVEL_DB_MIN:-INFO}
    working_dir: /app
    command: python -m src.web
    networks:
      - odin-network
    depends_on:
      - postgresql
      - rabbitmq
      - vault
      - minio
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  # API Microservices (internal only, not exposed directly via nginx)
  # Each service handles a specific domain and can be independently scaled/shut down
  
  # Confluence API microservice
  api-confluence:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: odin-api-confluence
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=8001
      - API_RELOAD=${API_RELOAD:-true}
      - API_LOG_LEVEL=${API_LOG_LEVEL:-info}
      - POSTGRES_DSN=postgresql+asyncpg://${POSTGRES_USER:-odin}:${POSTGRES_PASSWORD:-odin_dev_password}@postgresql:5432/${POSTGRES_DB:-odin_db}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_SECURE=false
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-odin}:${RABBITMQ_PASSWORD:-odin_dev_password}@rabbitmq:5672/
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN:-dev-root-token}
      - OLLAMA_BASE_URL=http://ollama:11434
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
      - LOG_BUFFER_SIZE=${LOG_BUFFER_SIZE:-100}
      - LOG_BUFFER_TIMEOUT=${LOG_BUFFER_TIMEOUT:-5.0}
      - LOG_LEVEL_DB_MIN=${LOG_LEVEL_DB_MIN:-INFO}
      - INACTIVITY_TIMEOUT_SECONDS=${INACTIVITY_TIMEOUT_SECONDS:-300}
    working_dir: /app
    command: python -m src.api.apps.__main__confluence__
    networks:
      - odin-network
    depends_on:
      - postgresql
      - rabbitmq
      - vault
      - minio
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/internal/activity"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: "no"
    profiles:
      - all
      - confluence

