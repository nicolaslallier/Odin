user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Standard log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # JSON log format for structured logging
    log_format json_combined escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Upstream servers
    upstream ollama_backend {
        server ollama:11434;
    }

    upstream n8n_backend {
        server n8n:5678;
    }

    upstream rabbitmq_management {
        server rabbitmq:15672;
    }

    upstream vault_backend {
        server vault:8200;
    }

    upstream minio_api {
        server minio:9000;
    }

    upstream minio_console {
        server minio:9001;
    }

    upstream app_backend {
        server portal:8000;
    }

    upstream flower_backend {
        server odin-flower:5555;
    }

    # API Microservices upstreams
    # Note: Upstreams commented out to allow nginx to start even when API services are not running
    # DNS resolution happens at request time using variables in location blocks
    
    # upstream api_confluence {
    #     server api-confluence:8001;
    # }
    #
    # upstream api_files {
    #     server api-files:8002;
    # }
    #
    # upstream api_llm {
    #     server api-llm:8003;
    # }
    #
    # upstream api_health {
    #     server api-health:8004;
    # }
    #
    # upstream api_logs {
    #     server api-logs:8005;
    # }
    #
    # upstream api_data {
    #     server api-data:8006;
    # }
    #
    # upstream api_secrets {
    #     server api-secrets:8007;
    # }
    #
    # upstream api_messages {
    #     server api-messages:8008;
    # }
    #
    # upstream api_image_analysis {
    #     server api-image-analysis:8009;
    # }

    # Main server block
    server {
        listen 80;
        server_name localhost;
        
        # Docker's internal DNS resolver
        # Allows dynamic DNS resolution of service names at request time
        # This permits nginx to start even when some services are not running
        resolver 127.0.0.11 valid=10s ipv6=off;

        # Health check endpoint for nginx itself
        location /nginx-health {
            access_log off;
            return 200 "nginx healthy\n";
            add_header Content-Type text/plain;
        }

        # Ollama service
        location /ollama/ {
            proxy_pass http://ollama_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # n8n workflow automation
        location /n8n/ {
            proxy_pass http://n8n_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # RabbitMQ Management UI
        location /rabbitmq/ {
            proxy_pass http://rabbitmq_management/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # HashiCorp Vault
        location /vault/ {
            proxy_pass http://vault_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        # HashiCorp Vault UI (redirected from /vault/)
        location /ui/ {
            proxy_pass http://vault_backend/ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        # HashiCorp Vault API endpoints (must come before root location)
        location /v1/ {
            proxy_pass http://vault_backend/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        # MinIO Console (must come before API to avoid conflicts)
        location /minio/ {
            proxy_pass http://minio_console/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # MinIO API (direct access, not through nginx proxy)
        # Access MinIO API directly at http://localhost:9000
        # Or configure your application to use minio:9000 from within Docker network

        # Flower Celery monitoring dashboard
        location /flower/ {
            proxy_pass http://flower_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # Odin API Microservices
        # Route requests to appropriate microservice based on path
        
        # Confluence API microservice
        location /api/confluence/ {
            set $api_confluence_backend http://api-confluence:8001;
            rewrite ^/api/confluence/(.*) /confluence/$1 break;
            proxy_pass $api_confluence_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering off;
            client_max_body_size 20M;
            
            # Return 503 if service is down with custom error
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Micro-frontend routes for all services
        # These routes serve the compiled React bundles from each microservice
        
        location /mfe/confluence/ {
            set $api_confluence_backend http://api-confluence:8001;
            proxy_pass $api_confluence_backend/confluence/mfe/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        location /mfe/files/ {
            set $api_files_backend http://api-files:8002;
            proxy_pass $api_files_backend/files/mfe/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        location /mfe/llm/ {
            set $api_llm_backend http://api-llm:8003;
            proxy_pass $api_llm_backend/llm/mfe/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        location /mfe/logs/ {
            set $api_logs_backend http://api-logs:8005;
            proxy_pass $api_logs_backend/logs/mfe/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        location /mfe/secrets/ {
            set $api_secrets_backend http://api-secrets:8007;
            proxy_pass $api_secrets_backend/secrets/mfe/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        location /mfe/messages/ {
            set $api_messages_backend http://api-messages:8008;
            proxy_pass $api_messages_backend/messages/mfe/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        location /mfe/image-analysis/ {
            set $api_image_analysis_backend http://api-image-analysis:8009;
            proxy_pass $api_image_analysis_backend/image-analysis/mfe/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Files API microservice
        location /api/files/ {
            set $api_files_backend http://api-files:8002;
            rewrite ^/api/files/(.*) /files/$1 break;
            proxy_pass $api_files_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering off;
            client_max_body_size 50M;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # LLM API microservice
        location /api/llm/ {
            set $api_llm_backend http://api-llm:8003;
            rewrite ^/api/llm/(.*) /llm/$1 break;
            proxy_pass $api_llm_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_buffering off;
            client_max_body_size 10M;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Health API microservice
        location /api/health/ {
            set $api_health_backend http://api-health:8004;
            rewrite ^/api/health/(.*) /health/$1 break;
            proxy_pass $api_health_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_buffering off;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Health micro-frontend
        location /mfe/health/ {
            set $api_health_backend http://api-health:8004;
            proxy_pass $api_health_backend/health/mfe/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_buffering off;
            
            # CORS headers for Module Federation
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Logs API microservice
        location /api/logs/ {
            set $api_logs_backend http://api-logs:8005;
            rewrite ^/api/logs/(.*) /logs/$1 break;
            proxy_pass $api_logs_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_buffering off;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Data API microservice
        location /api/data/ {
            set $api_data_backend http://api-data:8006;
            rewrite ^/api/data/(.*) /data/$1 break;
            proxy_pass $api_data_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_buffering off;
            client_max_body_size 10M;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Data micro-frontend
        location /mfe/data/ {
            set $api_data_backend http://api-data:8006;
            proxy_pass $api_data_backend/data/mfe/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header 'Access-Control-Allow-Origin' '*' always;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Secrets API microservice
        location /api/secrets/ {
            set $api_secrets_backend http://api-secrets:8007;
            rewrite ^/api/secrets/(.*) /secrets/$1 break;
            proxy_pass $api_secrets_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_buffering off;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Messages API microservice
        location /api/messages/ {
            set $api_messages_backend http://api-messages:8008;
            rewrite ^/api/messages/(.*) /messages/$1 break;
            proxy_pass $api_messages_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_buffering off;
            client_max_body_size 10M;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Image Analysis API microservice
        location /api/image-analysis/ {
            set $api_image_analysis_backend http://api-image-analysis:8009;
            rewrite ^/api/image-analysis/(.*) /image-analysis/$1 break;
            proxy_pass $api_image_analysis_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_buffering off;
            client_max_body_size 50M;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        # Error handler for unavailable API services
        location @api_unavailable {
            default_type application/json;
            return 503 '{"detail": "API service temporarily unavailable or starting up. Please retry in a few moments."}';
        }

        # Odin Web Portal - Root location (MAIN APPLICATION)
        location / {
            proxy_pass http://app_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }
    }
}

